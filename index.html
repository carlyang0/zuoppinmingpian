<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>作品名片｜个人能力证明工具</title>
  <style>
    :root {
      --bg: #eef0ed;
      --card: #ffffff;
      --text: #171717;
      --muted: #666666;
      --line: #e8e8e3;
      --primary: #111827;
      --primary-2: #374151;
      --accent: #f0efe9;
      --success: #0f766e;
      --warning: #b45309;
      --radius: 18px;
      --shadow: 0 16px 50px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    a { color: inherit; }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(238,240,237,0.88);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(232,232,227,0.9);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .pill {
      padding: 8px 12px;
      background: var(--accent);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
    }

    .app-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 0.86fr;
      gap: 28px;
      align-items: stretch;
      margin-bottom: 34px;
    }

    .hero-card, .panel, .preview {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 44px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(36px, 6vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.065em;
      overflow-wrap: anywhere;
    }

    .app-brief {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 18px 4px 16px;
    }

    .app-brief h1 {
      font-size: clamp(28px, 3vw, 42px);
      letter-spacing: -0.045em;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .app-brief .lead {
      margin: 0;
      font-size: 16px;
    }

    .status-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.74);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--primary-2);
      font-size: 13px;
      font-weight: 800;
    }

    .lead {
      color: var(--muted);
      max-width: 680px;
      font-size: 18px;
      margin: 0 0 24px;
    }

    .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }

    button, .btn {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover, .btn:hover { transform: translateY(-1px); }
    .primary { background: var(--primary); color: white; }
    .secondary { background: var(--accent); color: var(--text); border: 1px solid var(--line); }
    .ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }

    .mini-preview {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 360px;
      overflow: hidden;
      position: relative;
    }

    .mini-preview:before {
      content: "";
      position: absolute;
      inset: -80px -80px auto auto;
      width: 220px;
      height: 220px;
      background: #f5e7cf;
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.8;
    }

    .mini-top { position: relative; }
    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 17px;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .mini-title { font-size: 24px; font-weight: 850; letter-spacing: -0.04em; margin-bottom: 6px; }
    .mini-sub { color: var(--muted); }

    .mini-stack { display: grid; gap: 10px; position: relative; }
    .mini-item {
      padding: 13px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 14px;
    }
    .mini-item strong { display: block; margin-bottom: 2px; }
    .mini-item span { color: var(--muted); }

    .section-title {
      margin: 24px 0 14px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .section-title h2 { margin: 0; font-size: 26px; letter-spacing: -0.04em; }
    .section-title p { margin: 0; color: var(--muted); font-size: 14px; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(340px, 430px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 18px;
      max-height: calc(100vh - 154px);
      overflow: auto;
    }
    .panel h3 { margin: 0 0 12px; font-size: 18px; }

    .panel-kicker {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 14px 0 7px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      background: #fbfbfa;
      color: var(--text);
      font: inherit;
      outline: none;
      -webkit-appearance: none;
    }

    textarea { min-height: 92px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: #b6b6ae; background: white; }

    .work-input {
      border: 1px dashed #d8d8cf;
      background: #fcfcfb;
      padding: 14px;
      border-radius: 15px;
      margin-top: 12px;
    }

    .work-input-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .work-input-head strong {
      font-size: 14px;
    }

    .remove-work {
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 13px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
    }

    details.advanced-fields {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 10px 12px 14px;
    }

    details.advanced-fields summary {
      cursor: pointer;
      color: var(--primary-2);
      font-weight: 800;
      font-size: 14px;
    }

    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

    .preview-shell {
      background: #dedfd9;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: calc(100vh - 154px);
      padding: 12px;
      position: sticky;
      top: 88px;
    }

    .preview-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 3px 4px 12px;
      color: var(--primary-2);
      font-size: 13px;
      font-weight: 800;
    }

    .preview-dots {
      display: flex;
      gap: 6px;
    }

    .preview-dots span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #c8cac3;
    }

    .preview {
      padding: 24px;
      min-height: calc(100vh - 220px);
      max-height: calc(100vh - 220px);
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: none;
    }

    .generated-page {
      max-width: 960px;
      margin: 0 auto;
    }

    .gp-hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 28px;
      align-items: center;
      padding: 34px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .gp-hero:before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: #f5e7cf;
      border-radius: 999px;
      opacity: 0.6;
    }

    .gp-avatar {
      width: 92px;
      height: 92px;
      border-radius: 26px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 900;
      position: relative;
      z-index: 1;
    }

    .gp-hero-content {
      position: relative;
      z-index: 1;
    }

    .gp-hero h2 {
      margin: 0 0 6px;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1;
      letter-spacing: -0.045em;
    }

    .gp-identity {
      color: var(--primary-2);
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .gp-bio {
      color: var(--muted);
      max-width: 620px;
      margin-bottom: 14px;
    }

    .gp-contact {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .gp-section {
      margin-bottom: 28px;
    }

    .gp-section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .gp-section-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .gp-section-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .gp-items {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .gp-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      text-decoration: none;
      min-width: 0;
      transition: transform 0.16s ease, border 0.16s ease, box-shadow 0.16s ease;
    }

    .gp-item:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }

    .gp-item-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      flex-shrink: 0;
    }

    .gp-item-content {
      flex: 1;
      min-width: 0;
    }

    .gp-item-name {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .gp-item-desc {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .gp-link-tag {
      display: inline-flex;
      margin-top: 7px;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--primary-2);
      font-size: 11px;
      font-weight: 800;
    }

    .gp-arrow {
      color: #999;
      font-weight: 900;
    }

    .gp-score {
      padding: 18px;
      border-radius: 16px;
      background: #fefce8;
      border: 1px solid #fde68a;
      margin: 28px 0;
    }

    .gp-score strong {
      color: var(--warning);
    }

    .gp-score ul {
      margin: 8px 0 0 20px;
      padding: 0;
      color: #71480b;
    }

    .gp-cta {
      text-align: center;
      padding: 34px 22px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-top: 32px;
    }

    .gp-cta h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .gp-cta p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .gp-footer {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 28px 0 6px;
    }
    .portfolio-head {
      padding: 28px;
      border-radius: 22px;
      background: linear-gradient(135deg, #f8f6ef 0%, #ffffff 70%);
      border: 1px solid var(--line);
      margin-bottom: 22px;
    }

    .portfolio-head h2 {
      font-size: clamp(30px, 4vw, 48px);
      margin: 0 0 10px;
      letter-spacing: -0.055em;
      line-height: 1;
    }

    .positioning {
      font-size: 19px;
      color: var(--primary-2);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .intro { color: var(--muted); max-width: 720px; }

    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
    .tag {
      padding: 7px 10px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--line);
      font-size: 13px;
      color: var(--primary-2);
      font-weight: 700;
    }

    .block { margin-top: 26px; }
    .block h3 { margin: 0 0 13px; font-size: 20px; letter-spacing: -0.025em; }

    .works { display: grid; gap: 13px; }
    .work-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }
    .work-card h4 { margin: 0 0 6px; font-size: 18px; }
    .work-card p { margin: 7px 0; color: var(--muted); }
    .meta { color: var(--muted); font-size: 13px; }
    .proof { margin-top: 12px; padding: 12px; border-radius: 12px; background: #f9fafb; border: 1px solid #edf0f3; }
    .proof strong { display: block; margin-bottom: 5px; }
    .invalid-link { color: #b91c1c; font-size: 13px; margin-top: 8px; }

    .evidence-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .evidence-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #edf0f3;
      border-radius: 12px;
      background: #fbfbfa;
      font-size: 14px;
    }

    .evidence-item strong {
      color: var(--primary-2);
    }

    .score-card {
      padding: 16px;
      border-radius: 15px;
      background: #fefce8;
      border: 1px solid #fde68a;
      margin-top: 18px;
    }
    .score-card strong { color: var(--warning); }
    .score-card ul { margin: 8px 0 0 20px; padding: 0; color: #71480b; }

    .empty {
      display: grid;
      place-items: center;
      text-align: center;
      min-height: 500px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 30px;
      background: #fbfbfa;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      display: none;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    @media (max-width: 900px) {
      body {
        background: #eef0ed;
        padding-bottom: max(18px, env(safe-area-inset-bottom));
      }
      .shell {
        padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) 18px max(12px, env(safe-area-inset-left));
      }
      .app-header {
        border: 0;
        border-radius: 24px;
        padding: 12px;
        background: rgba(255,255,255,0.82);
        box-shadow: 0 12px 34px rgba(0,0,0,0.08);
      }
      .logo {
        width: 38px;
        height: 38px;
        border-radius: 12px;
      }
      .brand {
        font-size: 18px;
      }
      .pill {
        padding: 8px 12px;
        background: var(--accent);
        border: 0;
        color: var(--muted);
      }
      .app-actions #fillDemoBtn {
        background: var(--accent);
        color: var(--text);
        border: 1px solid var(--line);
        box-shadow: none;
      }
      .app-brief, .hero, .workspace { grid-template-columns: 1fr; }
      .app-brief { padding: 18px 2px 12px; }
      .app-brief h1 {
        font-size: 30px;
        line-height: 1.12;
        letter-spacing: -0.02em;
      }
      .status-strip { justify-content: flex-start; }
      .status-chip {
        background: rgba(255,255,255,0.82);
        border: 0;
        color: var(--primary-2);
        box-shadow: inset 0 0 0 1px rgba(60,60,67,0.08);
      }
      .hero, .workspace, .hero-card, .panel, .preview, .preview-shell { min-width: 0; max-width: 100%; }
      .panel {
        max-height: none;
        border: 0;
        border-radius: 26px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      }
      .preview-shell {
        position: static;
        min-height: 0;
        border: 0;
        border-radius: 26px;
        padding: 10px;
        background: rgba(255,255,255,0.58);
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      }
      .preview {
        min-height: 520px;
        max-height: none;
        border: 0;
        border-radius: 22px;
        padding: 18px;
      }
      .hero-card { padding: 24px 18px; }
      h1 { font-size: 28px; line-height: 1.14; letter-spacing: 0; word-break: break-all; }
      .lead { font-size: 16px; overflow-wrap: anywhere; word-break: break-all; }
      .two { grid-template-columns: 1fr; }
      header { align-items: flex-start; gap: 12px; flex-direction: column; }
      .app-actions { justify-content: flex-start; }
      label {
        margin-top: 16px;
        color: #6e6e73;
      }
      input, textarea, select {
        min-height: 48px;
        border: 0;
        border-radius: 14px;
        background: #f9f9fb;
        font-size: 16px;
        box-shadow: inset 0 0 0 1px rgba(60,60,67,0.12);
      }
      textarea {
        min-height: 104px;
      }
      button, .btn {
        min-height: 44px;
        border-radius: 14px;
        font-size: 16px;
        touch-action: manipulation;
      }
      .actions {
        gap: 8px;
      }
      .actions button {
        flex: 1 1 calc(50% - 8px);
      }
      .actions #generateBtn {
        flex-basis: 100%;
        order: -1;
      }
      .work-input {
        border: 0;
        border-radius: 20px;
        background: #f9f9fb;
        padding: 14px;
      }
      details.advanced-fields {
        border: 0;
        border-radius: 18px;
        background: #fff;
      }
      .portfolio-head, .work-card, .score-card {
        border-radius: 20px;
      }
      .gp-hero {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 28px 20px;
      }
      .gp-avatar {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        font-size: 32px;
        margin: 0 auto;
      }
      .gp-hero h2 {
        font-size: 26px;
      }
      .gp-bio {
        margin-left: auto;
        margin-right: auto;
      }
      .gp-items {
        grid-template-columns: 1fr;
      }
      .gp-item {
        border-radius: 16px;
      }
      .evidence-item { grid-template-columns: 1fr; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="shell">
    <header class="app-header">
      <div class="brand"><div class="logo">作</div><span>作品名片</span></div>
      <div class="app-actions">
        <div class="pill">个人能力证明工具</div>
        <button class="secondary" type="button" id="fillDemoBtn">查看示例</button>
      </div>
    </header>

    <section class="app-brief">
      <div>
        <h1>把经历整理成可信作品名片</h1>

    function getWorks() {

        proof: el.querySelector('.work-proof').value.trim()
      })).filter(w => w.title || w.url || w.desc || w.background || w.role || w.action || w.result || w.proof);
    }

    function inferSummary(work) {
      const typeName = {
        product: '一个产品/工具项目',
        article: '一篇内容作品',
        video: '一个视频内容作品',
        event: '一次活动项目',
        case: '一个项目案例',
        other: '一个综合实践项目'
      }[work.type];
      const source = [work.desc, work.background, work.action, work.result].filter(Boolean).join(' ');
      if (source.length > 18) return source.slice(0, 96) + (source.length > 96 ? '…' : '');
      return `${typeName}，用于展示具体实践、问题解决和执行能力。`;
    }

    function credibilityScore(works) {
      let score = 40;
      works.forEach(w => {
        const evidenceText = [w.desc, w.background, w.role, w.action, w.result, w.proof].join(' ');
        if (w.desc.length > 18) score += 8;
        if (w.url) score += 5;
        if (w.background) score += 3;
        if (w.role) score += 3;
        if (w.action.length > 24) score += 5;
        if (w.result.length > 12) score += 7;
        if (w.proof || /截图|评价|反馈|链接|视频|数据|看板|证明|推荐|复盘/.test(evidenceText)) score += 5;
        if (/用户|访问|收入|报名|增长|数据|反馈|转化|播放|阅读|成交|GMV|UV|PV|下载|客户|提升|降低|节省|完成|上线/.test(evidenceText)) score += 6;
      });
      return Math.min(95, score);
    }

    function missingTips(works) {
      const tips = [];
      if (works.some(w => !w.desc && !w.action)) tips.push('有些作品还只有标题，补几句素材后会更容易看出你的能力。');
      if (works.some(w => !w.url && !w.proof)) tips.push('部分作品缺少可验证材料，建议补链接、截图、视频或用户反馈。');
      if (!works.some(w => /用户|访问|收入|报名|增长|数据|反馈|转化|播放|阅读|成交|GMV|UV|PV|下载|客户|提升|降低|节省|完成|上线|\d/.test([w.desc, w.result].join(' ')))) tips.push('如果有结果数据，建议补一个数字，例如访问量、用户反馈、报名数或上线结果。');
      if (works.length < 3) tips.push('建议整理 3-5 个代表作品，让能力画像更完整。');
      if (!tips.length) tips.push('当前信息已经适合对外分享，后续可继续补充截图和第三方反馈。');
      return tips;
    }

    function normalizeURL(url) {
      const trimmed = url.trim();
      if (!trimmed) return null;
      const candidate = /^[a-z][a-z0-9+.-]*:/i.test(trimmed) ? trimmed : `https://${trimmed}`;
      try {
        const parsed = new URL(candidate);
        if (!['http:', 'https:', 'mailto:'].includes(parsed.protocol)) return null;
        return { href: parsed.href, label: candidate };
      } catch (error) {
        return null;
      }
    }

              <div class="gp-section-icon" style="background:${config.bg};color:${config.color}">${escapeHTML(config.icon)}</div>

    function escapeHTML(str) {
      return String(str).replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag]));
    }

    function copyText(text) {
      const fallbackCopy = () => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        textarea.remove();
        return ok;
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(() => showToast('已复制分享文案'))
          .catch(() => showToast(fallbackCopy() ? '已复制分享文案' : '复制失败，请手动复制'));
        return;
      }

      showToast(fallbackCopy() ? '已复制分享文案' : '复制失败，请手动复制');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 1800);
    }

    function downloadPDF() {
      const previewEl = document.getElementById('preview');
      html2canvas(previewEl, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#eef0ed',
        logging: false
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        let heightLeft = pdfHeight;
        let position = 0;
        const pageHeight = pdf.internal.pageSize.getHeight();
        pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
        heightLeft -= pageHeight;
        while (heightLeft > 0) {
          position = heightLeft - pdfHeight;
          pdf.addPage();
          pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
          heightLeft -= pageHeight;
        }
        pdf.save('my-portfolio.pdf');
      }).catch(err => {
        showToast('PDF 生成失败，请重试');
      });
    }

    function downloadJPG() {
      const previewEl = document.getElementById('preview');
      html2canvas(previewEl, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#eef0ed',
        logging: false
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'my-portfolio.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.92);
        link.click();
      }).catch(err => {
        showToast('JPG 生成失败，请重试');
      });
    }

    function collectDraft() {
      return {
        name: document.getElementById('name').value,
        identity: document.getElementById('identity').value,
        purpose: document.getElementById('purpose').value,
        bio: document.getElementById('bio').value,
        contact: document.getElementById('contact').value,
        works: getWorks()
      };
    }

    function applyDraft(draft) {
      if (!draft) return;
      document.getElementById('name').value = draft.name || '';
      document.getElementById('identity').value = draft.identity || 'AI 产品经理';
      document.getElementById('purpose').value = draft.purpose || 'job';
      document.getElementById('bio').value = draft.bio || '';
      document.getElementById('contact').value = draft.contact || '';
      document.getElementById('worksInput').innerHTML = '';
      workCount = 0;
      (draft.works && draft.works.length ? draft.works : [{}]).forEach(addWork);
    }

    function saveDraft(showMessage = true) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectDraft()));
        if (showMessage) showToast('草稿已保存');
      } catch (error) {
        if (showMessage) showToast('当前浏览器不支持保存草稿');
      }
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          showToast('暂无可恢复草稿');
          return;
        }
        applyDraft(JSON.parse(raw));
        showToast('草稿已恢复');
      } catch (error) {
        showToast('草稿读取失败');
      }
    }

    document.getElementById('fillDemoBtn').addEventListener('click', fillDemo);
    document.getElementById('addWorkBtn').addEventListener('click', () => addWork());
    document.getElementById('generateBtn').addEventListener('click', generatePortfolio);
    document.getElementById('saveDraftBtn').addEventListener('click', () => saveDraft(true));
    document.getElementById('loadDraftBtn').addEventListener('click', loadDraft);
    document.getElementById('worksInput').addEventListener('click', event => {
      if (!event.target.classList.contains('remove-work')) return;
      const work = event.target.closest('[data-work="true"]');
      if (work) work.remove();
      if (!document.querySelector('[data-work="true"]')) addWork();
    });
    document.getElementById('preview').addEventListener('click', event => {
      if (event.target.id === 'copyShareBtn') copyText(currentShareCopy);
      if (event.target.id === 'downloadPdfBtn') downloadPDF();
      if (event.target.id === 'downloadJpgBtn') downloadJPG();
    });

    addWork();
  </script>
</body>
</html>
